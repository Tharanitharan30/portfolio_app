name: tharani_portfolio
description: "Tharani Portfolio mobile application foundation."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  
  stylish_bottom_bar: ^1.1.0
  glass_kit: ^4.0.2
  glassmorphism: ^3.0.0
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/

flutter_native_splash:
  color: "#F5F7F4"
  color_dark: "#0B1514"
  image: assets/images/app_logo.png
  image_dark: assets/images/app_logo.png
  android_12:
    color: "#F5F7F4"
    color_dark: "#0B1514"
    image: assets/images/app_logo.png
    image_dark: assets/images/app_logo.png
  ios: true
  android: true
  web: false
